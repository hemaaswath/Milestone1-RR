<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Recommendation System - Monitoring Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .metric-item {
            text-align: center;
            padding: 15px;
            background: var(--light-color);
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }
        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 5px;
        }
        .metric-label {
            color: #666;
            font-size: 0.9rem;
        }
        .chart-container {
            height: 300px;
            margin-top: 15px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-healthy { background: var(--success-color); }
        .status-degraded { background: var(--warning-color); }
        .status-unhealthy { background: var(--error-color); }
        .alert {
            background: rgba(231, 76, 60, 0.1);
            border: 2px solid var(--error-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .refresh-button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .refresh-button:hover {
            background: var(--secondary-color);
        }
        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>FoodAI Monitoring</span>
                </div>
                <nav class="nav">
                    <a href="../index.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        App
                    </a>
                    <a href="#system-health" class="nav-link active">
                        <i class="fas fa-heartbeat"></i>
                        Monitoring
                    </a>
                </nav>
            </div>
        </header>

        <main class="main">
            <!-- System Health Overview -->
            <section id="system-health">
                <div class="dashboard-card">
                    <h2><i class="fas fa-heartbeat"></i> System Health</h2>
                    <div id="health-status"></div>
                </div>
            </section>

            <div class="dashboard-container">
                <!-- Performance Metrics -->
                <div class="dashboard-card">
                    <h2><i class="fas fa-tachometer-alt"></i> Performance Metrics</h2>
                    <div class="metric-grid" id="performance-metrics">
                        <!-- Metrics will be populated by JavaScript -->
                    </div>
                </div>

                <!-- User Analytics -->
                <div class="dashboard-card">
                    <h2><i class="fas fa-users"></i> User Analytics</h2>
                    <div class="chart-container">
                        <canvas id="usage-chart"></canvas>
                    </div>
                </div>
            </div>

            <div class="dashboard-container">
                <!-- Recommendation Analytics -->
                <div class="dashboard-card">
                    <h2><i class="fas fa-star"></i> Recommendation Performance</h2>
                    <div class="chart-container">
                        <canvas id="recommendation-chart"></canvas>
                    </div>
                </div>

                <!-- System Resources -->
                <div class="dashboard-card">
                    <h2><i class="fas fa-server"></i> System Resources</h2>
                    <div class="chart-container">
                        <canvas id="resource-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Feedback Analysis -->
            <div class="dashboard-card">
                <h2><i class="fas fa-comments"></i> User Feedback Analysis</h2>
                <div class="metric-grid" id="feedback-metrics">
                    <!-- Feedback metrics will be populated by JavaScript -->
                </div>
                <div class="chart-container">
                    <canvas id="feedback-chart"></canvas>
                </div>
            </div>

            <!-- Improvement Suggestions -->
            <div class="dashboard-card">
                <h2><i class="fas fa-lightbulb"></i> Improvement Suggestions</h2>
                <div id="improvement-suggestions"></div>
                <button class="refresh-button" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i>
                    Refresh Data
                </button>
            </div>
        </main>
    </div>

    <script>
        class MonitoringDashboard {
            constructor() {
                this.apiBase = 'http://127.0.0.1:8000/api/v1';
                this.charts = {};
                this.refreshInterval = null;
                this.init();
            }

            async init() {
                await this.loadSystemHealth();
                await this.loadPerformanceMetrics();
                await this.loadUserAnalytics();
                await this.loadRecommendationAnalytics();
                await this.loadSystemResources();
                await this.loadFeedbackAnalysis();
                await this.loadImprovementSuggestions();
                
                // Start auto-refresh
                this.startAutoRefresh();
            }

            async loadSystemHealth() {
                try {
                    const response = await fetch(`${this.apiBase}/monitoring/health`);
                    const data = await response.json();
                    
                    const healthDiv = document.getElementById('health-status');
                    healthDiv.innerHTML = `
                        <div class="metric-item">
                            <div class="status-indicator status-${data.status}"></div>
                            <div class="metric-label">System Status</div>
                            <div class="metric-value">${data.status.toUpperCase()}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">CPU Usage</div>
                            <div class="metric-value">${data.metrics.cpu_percent.toFixed(1)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Memory Usage</div>
                            <div class="metric-value">${data.metrics.memory_percent.toFixed(1)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Response Time</div>
                            <div class="metric-value">${data.metrics.response_time_avg.toFixed(2)}s</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Error Rate</div>
                            <div class="metric-value">${data.metrics.error_rate.toFixed(1)}%</div>
                        </div>
                    `;
                    
                    if (data.issues && data.issues.length > 0) {
                        healthDiv.innerHTML += `
                            <div class="alert">
                                <h4><i class="fas fa-exclamation-triangle"></i> Issues Detected</h4>
                                <ul>${data.issues.map(issue => `<li>${issue}</li>`).join('')}</ul>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Error loading system health:', error);
                }
            }

            async loadPerformanceMetrics() {
                try {
                    const response = await fetch(`${this.apiBase}/monitoring/performance?minutes=60`);
                    const data = await response.json();
                    
                    const metricsDiv = document.getElementById('performance-metrics');
                    metricsDiv.innerHTML = `
                        <div class="metric-item">
                            <div class="metric-label">Requests/min</div>
                            <div class="metric-value">${data.statistics.total_requests}</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Avg Response Time</div>
                            <div class="metric-value">${data.statistics.avg_response_time.toFixed(2)}s</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Success Rate</div>
                            <div class="metric-value">${data.statistics.success_rate.toFixed(1)}%</div>
                        </div>
                    `;
                } catch (error) {
                    console.error('Error loading performance metrics:', error);
                }
            }

            async loadUserAnalytics() {
                try {
                    const response = await fetch(`${this.apiBase}/analytics/user-behavior?days=7`);
                    const data = await response.json();
                    
                    this.createUserAnalyticsChart(data);
                } catch (error) {
                    console.error('Error loading user analytics:', error);
                }
            }

            async loadRecommendationAnalytics() {
                try {
                    const response = await fetch(`${this.apiBase}/analytics/recommendations?days=7`);
                    const data = await response.json();
                    
                    this.createRecommendationChart(data);
                } catch (error) {
                    console.error('Error loading recommendation analytics:', error);
                }
            }

            async loadSystemResources() {
                try {
                    const response = await fetch(`${this.apiBase}/monitoring/metrics`);
                    const data = await response.json();
                    
                    this.createResourceChart(data);
                } catch (error) {
                    console.error('Error loading system resources:', error);
                }
            }

            async loadFeedbackAnalysis() {
                try {
                    const response = await fetch(`${this.apiBase}/feedback/analyze?days=7`);
                    const data = await response.json();
                    
                    const feedbackDiv = document.getElementById('feedback-metrics');
                    feedbackDiv.innerHTML = `
                        <div class="metric-item">
                            <div class="metric-label">Overall Satisfaction</div>
                            <div class="metric-value">${(data.analysis.overall_satisfaction * 100).toFixed(1)}%</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-label">Total Feedback</div>
                            <div class="metric-value">${data.data.total_feedback_entries}</div>
                        </div>
                    `;
                    
                    this.createFeedbackChart(data);
                } catch (error) {
                    console.error('Error loading feedback analysis:', error);
                }
            }

            async loadImprovementSuggestions() {
                try {
                    const response = await fetch(`${this.apiBase}/improvement/check-data`);
                    const data = await response.json();
                    
                    const suggestionsDiv = document.getElementById('improvement-suggestions');
                    
                    if (data.data.recommendations && data.data.recommendations.length > 0) {
                        suggestionsDiv.innerHTML = `
                            <h4><i class="fas fa-lightbulb"></i> Suggestions for Improvement</h4>
                            <ul>${data.data.recommendations.map(rec => `<li>${rec}</li>`).join('')}</ul>
                        `;
                    } else {
                        suggestionsDiv.innerHTML = '<p><i class="fas fa-check-circle"></i> System is performing optimally</p>';
                    }
                } catch (error) {
                    console.error('Error loading improvement suggestions:', error);
                }
            }

            createUserAnalyticsChart(data) {
                const ctx = document.getElementById('usage-chart').getContext('2d');
                
                if (this.charts.usage) {
                    this.charts.usage.destroy();
                }
                
                this.charts.usage = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.data.top_searched_locations.map(loc => loc[0]),
                        datasets: [{
                            label: 'Searches',
                            data: data.data.top_searched_locations.map(loc => loc[1]),
                            borderColor: 'rgb(75, 192, 192)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: 'User Search Trends (Last 7 Days)'
                            }
                        }
                    }
                });
            }

            createRecommendationChart(data) {
                const ctx = document.getElementById('recommendation-chart').getContext('2d');
                
                if (this.charts.recommendation) {
                    this.charts.recommendation.destroy();
                }
                
                this.charts.recommendation = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.data.top_performing_recommendations.map(rec => rec.restaurant_name),
                        datasets: [{
                            label: 'Click-through Rate (%)',
                            data: data.data.top_performing_recommendations.map(rec => rec.click_through_rate),
                            backgroundColor: 'rgba(54, 162, 235, 0.8)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: 'Top Performing Recommendations'
                            }
                        }
                    }
                });
            }

            createResourceChart(data) {
                const ctx = document.getElementById('resource-chart').getContext('2d');
                
                if (this.charts.resource) {
                    this.charts.resource.destroy();
                }
                
                this.charts.resource = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['CPU', 'Memory', 'Disk'],
                        datasets: [{
                            data: [data.metrics.cpu_percent, data.metrics.memory_percent, data.metrics.disk_usage_percent],
                            backgroundColor: [
                                'rgba(255, 99, 132, 0.8)',
                                'rgba(54, 162, 235, 0.8)',
                                'rgba(255, 205, 86, 0.8)'
                            ],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: 'System Resource Usage'
                            }
                        }
                    }
                });
            }

            createFeedbackChart(data) {
                const ctx = document.getElementById('feedback-chart').getContext('2d');
                
                if (this.charts.feedback) {
                    this.charts.feedback.destroy();
                }
                
                this.charts.feedback = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: Object.keys(data.analysis.rating_distribution),
                        datasets: [{
                            data: Object.values(data.analysis.rating_distribution),
                            backgroundColor: [
                                'rgba(255, 205, 86, 0.8)',
                                'rgba(75, 192, 235, 0.8)',
                                'rgba(54, 162, 235, 0.8)',
                                'rgba(255, 99, 132, 0.8)',
                                'rgba(255, 159, 64, 0.8)'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: 'User Rating Distribution'
                            }
                        }
                    }
                });
            }

            startAutoRefresh() {
                this.refreshInterval = setInterval(async () => {
                    await this.loadSystemHealth();
                    await this.loadPerformanceMetrics();
                }, 30000); // Refresh every 30 seconds
            }

            async refreshData() {
                // Show loading state
                const button = document.querySelector('.refresh-button');
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';
                button.disabled = true;
                
                try {
                    // Refresh all data
                    await this.loadSystemHealth();
                    await this.loadPerformanceMetrics();
                    await this.loadUserAnalytics();
                    await this.loadRecommendationAnalytics();
                    await this.loadSystemResources();
                    await this.loadFeedbackAnalysis();
                    await this.loadImprovementSuggestions();
                    
                    // Show success message
                    button.innerHTML = '<i class="fas fa-check"></i> Refreshed!';
                    setTimeout(() => {
                        button.innerHTML = originalText;
                        button.disabled = false;
                    }, 2000);
                    
                } catch (error) {
                    console.error('Error refreshing data:', error);
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            }
        }

        // Initialize dashboard when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.monitoringDashboard = new MonitoringDashboard();
        });
    </script>
</body>
</html>
